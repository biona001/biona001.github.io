<!DOCTYPE html>
<html>
<head>
  <title>Places I've Been</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { margin: 0; padding: 0; }
    #map { height: 100vh; width: 100%; }
  </style>
  <script src="visited-locations.js"></script>
</head>
<body>
  <div id="map"></div>
  <script type="text/javascript">
    var map = L.map('map').setView([20, 10], 2);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 18,
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
    }).addTo(map);

    for (var i = 0; i < visitedPlaces.length; i++) {
      var place = visitedPlaces[i];
      L.circleMarker([place[1], place[2]], {
        radius: 7,
        fillColor: "#e74c3c",
        color: "#c0392b",
        weight: 2,
        opacity: 1,
        fillOpacity: 0.8
      }).bindPopup("<b>" + place[0] + "</b>").addTo(map);
    }
  </script>
</body>
</html>
